name: unibuddy
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  cloud_firestore: ^5.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/unibuddy_logo_padded.png
  remove_alpha_ios: true
  adaptive_icon_foreground: assets/images/unibuddy_logo_padded.png
  adaptive_icon_background: "#0F766E"
  adaptive_icon_foreground_inset: 24

flutter_native_splash:
  color: "#0F766E"
  image: assets/images/unibuddy_logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/unibuddy_logo.png
    color: "#0F766E"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
